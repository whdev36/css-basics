<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Example 2 | Selectors</title>
    <link rel="stylesheet" href="./css/example_02.css">
</head>

<body>
    <!-- Element selector -->
    <p>Element</p>

    <!-- Class -->
    <p class="text">Class</p>

    <!-- ID -->
    <p id="text">ID</p>

    <!-- Attribute -->
    <p disabled>Attribute</p>

    <!-- Universal -->
    <p>Universal</p>
</body>

</html>
